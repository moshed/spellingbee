name: Update NYT Spelling Bee data

on:
  schedule:
    - cron: '0 11 * * *'    # 07:00 ET (EDT) — the source is usually ready by ~7am ET
    - cron: '0 14 * * *'    # ~10:00 ET safety-net in case the source updated late that day
  workflow_dispatch:         # allow manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-nyt
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch + merge NYT data
        run: python3 scripts/update-nyt.py
      - name: Commit if changed
        run: |
          git config user.name "nyt-bee-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nyt-bee.json words.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: daily NYT Spelling Bee data update"
            git pull --rebase --autostash origin main || true
            git push
          fi
