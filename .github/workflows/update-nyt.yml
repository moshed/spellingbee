name: Update NYT Spelling Bee data

on:
  schedule:
    # Every 10 min from ~7am–1pm ET. The script no-ops instantly once today's
    # puzzle is already in nyt-bee.json, so it just retries until it lands.
    - cron: '*/10 11-17 * * *'
  workflow_dispatch:         # allow manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-nyt
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch + merge NYT data
        run: python3 scripts/update-nyt.py
      - name: Commit if changed
        run: |
          git config user.name "nyt-bee-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nyt-bee.json words.json common-words.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: daily NYT Spelling Bee data update"
            git pull --rebase --autostash origin main || true
            git push
          fi
